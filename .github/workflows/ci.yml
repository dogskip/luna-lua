name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lua-version: ['5.3', '5.4', 'luajit']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.lua-version }}
      - name: Run LRU tests
        run: lua spec/lru_spec.lua
        env:
          LUA_PATH: src/?.lua;;
      - name: Run LFU tests
        run: lua spec/lfu_spec.lua
        env:
          LUA_PATH: src/?.lua;;

  lint:
    runs-on: ubuntu-latest
    # luacheck 정적 분석으로 미사용 변수, 전역 오염 등 포착.
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck
      - name: Run luacheck
        run: luacheck src spec --codes --no-config
